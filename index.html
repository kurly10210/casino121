<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 Casino Slot Machine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .casino-container {
            max-width: 800px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2a3a;
            padding: 15px 20px;
            border-radius: 60px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .balance-card {
            background: #0f212e;
            padding: 8px 20px;
            border-radius: 40px;
            text-align: center;
        }
        .balance-card span {
            font-size: 14px;
            opacity: 0.8;
        }
        .balance-card .amount {
            font-size: 28px;
            font-weight: bold;
            color: #f3c623;
            margin-left: 10px;
        }
        .login-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .login-area input {
            padding: 8px 12px;
            border-radius: 30px;
            border: none;
            background: #2c3e44;
            color: white;
        }
        button {
            background: #f3c623;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #1e2a3a;
        }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .slot-machine {
            background: #2c1e1a;
            border-radius: 60px;
            padding: 30px 20px;
            margin: 20px 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
        }
        .reels {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .reel {
            background: white;
            width: 100px;
            height: 100px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            box-shadow: 0 0 0 4px #f3c623, inset 0 0 0 2px rgba(0,0,0,0.2);
            transition: 0.1s linear;
            overflow: hidden;
        }
        .reel img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
        .controls {
            text-align: center;
            margin-top: 15px;
        }
        .bet-selector {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: #1e2a3a;
            padding: 8px 20px;
            border-radius: 40px;
            margin: 10px;
        }
        .bet-selector label { font-weight: bold; }
        .bet-selector input {
            width: 90px;
            padding: 6px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
        }
        .spin-btn {
            background: #e67e22;
            color: white;
            padding: 12px 30px;
            font-size: 20px;
            box-shadow: 0 5px 0 #b45f1b;
        }
        .message-area {
            margin-top: 20px;
            padding: 12px;
            text-align: center;
            background: #0f212e;
            border-radius: 30px;
            font-weight: bold;
        }
        .win { color: #f3c623; }
        .error { color: #e67e22; }
        .history {
            margin-top: 25px;
            background: #0a1118;
            border-radius: 20px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history h4 { margin: 0 0 8px 0; font-size: 14px; opacity: 0.8; }
        .history table { width: 100%; font-size: 12px; }
        .history th, .history td { padding: 5px; text-align: left; border-bottom: 1px solid #2c3e44; }
        .logout-btn { background: #555; color: white; margin-left: 10px; }
        @media (max-width: 550px) {
            .reel { width: 70px; height: 70px; font-size: 40px; }
        }
    </style>
</head>
<body>
<div class="casino-container">
    <div class="header">
        <div style="font-weight: bold; font-size: 1.3rem;">🎰 SLOT KING</div>
        <div id="balanceArea" style="display: none;">
            <div class="balance-card">
                <span>💰 BALANCE</span>
                <span class="amount" id="balance">$0.00</span>
                <div style="font-size: 12px;">🎁 Bonus: <span id="bonusBalance">$0.00</span></div>
            </div>
        </div>
        <div id="loginArea">
            <div class="login-area">
                <input type="text" id="username" placeholder="Username" value="TestPlayer">
                <input type="password" id="password" placeholder="Password" value="test123">
                <button id="loginBtn">Login</button>
                <button id="registerBtn">Register</button>
            </div>
        </div>
    </div>

    <div id="gameArea" style="display: none;">
        <div class="slot-machine">
            <div class="reels" id="reelsContainer">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>
            <div class="controls">
                <div class="bet-selector">
                    <label>💰 BET:</label>
                    <input type="number" id="betAmount" value="5.00" step="1" min="1" max="100">
                </div>
                <div>
                    <button id="spinBtn" class="spin-btn">🎰 SPIN</button>
                </div>
            </div>
            <div class="message-area" id="message">Ready to play!</div>
        </div>

        <div class="history">
            <h4>📜 Last Spins</h4>
            <div id="recentBets">
                <table><tr><th>Game</th><th>Bet</th><th>Win</th><th>Time</th></tr></table>
            </div>
        </div>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
</div>

<script>
    // ---------- CONFIGURATION ----------
    const API_BASE = '/api';  // assumes same origin as server (server serves this HTML)
    let currentUser = null;

    // Slot symbols (you can replace with your own images)
    // Format: { display: "🍒", value: "cherry", multiplier: 2 } etc.
    // For images, you can use <img src='your_asset.png'> instead of emoji
    const SYMBOLS = [
        { display: "🍒", name: "cherry", multiplier: 2 },
        { display: "🍊", name: "orange", multiplier: 3 },
        { display: "🍉", name: "watermelon", multiplier: 5 },
        { display: "🔔", name: "bell", multiplier: 8 },
        { display: "⭐", name: "star", multiplier: 12 },
        { display: "💎", name: "diamond", multiplier: 20 }
    ];

    // Win calculation: if all three symbols match, win = bet * multiplier
    function calculateWin(symbolIndices, betAmount) {
        const [i1, i2, i3] = symbolIndices;
        if (i1 === i2 && i2 === i3) {
            return betAmount * SYMBOLS[i1].multiplier;
        }
        return 0;
    }

    // DOM elements
    const reelDivs = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
    const spinBtn = document.getElementById('spinBtn');
    const betInput = document.getElementById('betAmount');
    const messageDiv = document.getElementById('message');

    // Helper: fetch wrapper
    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    function showMessage(msg, isError = false) {
        messageDiv.textContent = msg;
        messageDiv.className = `message-area ${isError ? 'error' : 'win'}`;
        setTimeout(() => { if (messageDiv.textContent === msg) messageDiv.textContent = "Ready to play!"; }, 3000);
    }

async function loadBalance() {
    if (!currentUser) return;
    try {
        const data = await apiCall(`/balance/${currentUser.userId}`);
        console.log("Balance API response:", data);
        
        // Try both possible property names (capital B or lowercase b)
        const balance = (data.Balance !== undefined) ? data.Balance : data.balance;
        const bonusBalance = (data.BonusBalance !== undefined) ? data.BonusBalance : data.bonusBalance;
        
        document.getElementById('balance').textContent = `$${parseFloat(balance || 0).toFixed(2)}`;
        document.getElementById('bonusBalance').textContent = `$${parseFloat(bonusBalance || 0).toFixed(2)}`;
    } catch (err) {
        console.error("Balance load error:", err);
        showMessage("Failed to load balance", true);
    }

    }

    async function loadRecentBets() {
        if (!currentUser) return;
        try {
            const bets = await apiCall(`/bets/${currentUser.userId}`);
            const container = document.getElementById('recentBets');
            let html = '<table><th>Game</th><th>Bet</th><th>Win</th><th>Time</th></tr>';
            bets.slice(0, 8).forEach(bet => {
                html += `<tr>
                    <td>🎰 Slots</td>
                    <td>$${bet.BetAmount.toFixed(2)}</td>
                    <td style="color:#f3c623">$${bet.WinAmount.toFixed(2)}</td>
                    <td>${new Date(bet.BetTimestamp).toLocaleTimeString()}</td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        } catch(e) {}
    }

    // Animate reel spin
    function animateReel(reelElement, finalSymbol, duration = 300) {
        const frames = 12;
        const stepTime = duration / frames;
        let count = 0;
        const interval = setInterval(() => {
            const randomSymbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)].display;
            reelElement.innerHTML = randomSymbol;
            count++;
            if (count >= frames) {
                clearInterval(interval);
                reelElement.innerHTML = finalSymbol;
            }
        }, stepTime);
    }

    async function spin() {
        if (!currentUser) {
            showMessage("Please login first", true);
            return;
        }

        const bet = parseFloat(betInput.value);
        if (isNaN(bet) || bet <= 0) {
            showMessage("Invalid bet amount", true);
            return;
        }

        // Disable spin button during process
        spinBtn.disabled = true;
        const originalText = spinBtn.textContent;
        spinBtn.textContent = "⏳ SPINNING...";

        try {
            // 1. Call placeBet API
            const placeResult = await apiCall('/placeBet', 'POST', {
                userId: currentUser.userId,
                gameId: 1,   // Game ID 1 = Starburst (any game works)
                amount: bet
            });
            if (!placeResult.success) throw new Error(placeResult.error);

            const betId = placeResult.betId;

            // 2. Generate random slot result
            const symbolIndices = [
                Math.floor(Math.random() * SYMBOLS.length),
                Math.floor(Math.random() * SYMBOLS.length),
                Math.floor(Math.random() * SYMBOLS.length)
            ];
            const winAmount = calculateWin(symbolIndices, bet);
            const finalSymbols = symbolIndices.map(i => SYMBOLS[i].display);

            // 3. Animate reels
            for (let i = 0; i < reelDivs.length; i++) {
                animateReel(reelDivs[i], finalSymbols[i], 400);
            }

            // 4. Wait for animation to finish (approx)
            await new Promise(resolve => setTimeout(resolve, 450));

            // 5. If winAmount > 0, call processWin API
            if (winAmount > 0) {
                await apiCall('/processWin', 'POST', { betId, winAmount });
                showMessage(`🎉 YOU WON $${winAmount.toFixed(2)}! 🎉`);
            } else {
                showMessage(`😞 No win. Better luck next spin!`);
            }

            // 6. Refresh balance and history
            await loadBalance();
            await loadRecentBets();

        } catch (err) {
            showMessage(err.message, true);
        } finally {
            spinBtn.disabled = false;
            spinBtn.textContent = originalText;
        }
    }

    // ----- Authentication -----
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const data = await apiCall('/login', 'POST', { username, password });
            currentUser = { userId: data.userId, username: data.username };
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('balanceArea').style.display = 'block';
            document.getElementById('gameArea').style.display = 'block';
            await loadBalance();
            await loadRecentBets();
            showMessage(`Welcome ${currentUser.username}! Spin to win.`);
        } catch (err) {
            showMessage("Login failed: " + err.message, true);
        }
    }

    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            await apiCall('/register', 'POST', {
                username,
                password,
                email: `${username}@casino.com`,
                dob: '1990-01-01'
            });
            showMessage("Registration successful! Please login.");
        } catch (err) {
            showMessage("Registration failed: " + err.message, true);
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginArea').style.display = 'block';
        document.getElementById('balanceArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'none';
        showMessage("Logged out.");
    }

    // Event listeners
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('logoutBtn').onclick = logout;
    spinBtn.onclick = spin;

    // If already logged in from session, but we don't persist; just show login area.
</script>
</body>
</html>
